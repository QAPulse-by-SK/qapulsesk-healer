name: Nightly Integration

# Runs the live heal-loop tests against skakarh.com.
# Heavyweight: starts real Chrome, makes real LLM API calls.
# - Scheduled nightly at 03:30 UTC.
# - Also triggerable manually via "Run workflow" on the Actions tab.
# - Never blocks PR merges (only the lightweight CI in ci.yml gates merges).
# - Prefers GEMINI_API_KEY (free tier) over ANTHROPIC_API_KEY when both are set.

on:
  schedule:
    # 03:30 UTC = roughly off-peak across most regions
    - cron: "30 3 * * *"
  workflow_dispatch: {}

jobs:
  integration:
    name: Live heal loop vs skakarh.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,gemini,selenium,dev]"

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome

      - name: Run integration tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::Neither GEMINI_API_KEY nor ANTHROPIC_API_KEY secret is set. Skipping integration tests."
            exit 0
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "Using Gemini (free tier) for the heal loop."
          else
            echo "Using Anthropic for the heal loop."
          fi
          pytest -m integration -v --tb=short

      - name: Upload artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-debug
          path: |
            .pytest_cache/
            healer_debug/
          if-no-files-found: ignore
          retention-days: 7
